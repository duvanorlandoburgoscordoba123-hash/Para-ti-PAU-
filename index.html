<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Paula ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
background:black;
}

/* VIDEO */

video{
position:fixed;
width:100%;
height:100%;
object-fit:cover;
z-index:-3;
filter:brightness(0.25);
}

.overlay{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.45);
z-index:-2;
}

/* CELULAR */

.phone{
width:320px;
height:650px;
background:#111b21;
border-radius:40px;
overflow:hidden;
position:relative;
box-shadow:0 0 40px rgba(0,0,0,0.6);
border:4px solid rgba(255,255,255,0.08);
}

/* NOTCH */

.notch{
width:140px;
height:28px;
background:black;
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
border-radius:20px;
z-index:5;
}

/* HEADER */

.header{
height:75px;
background:#202c33;
display:flex;
align-items:center;
padding:20px;
padding-top:30px;
gap:12px;
color:white;
}

.avatar{
width:45px;
height:45px;
border-radius:50%;
background-image:url('https://i.imgur.com/8Km9tLL.jpg');
background-size:cover;
background-position:center;
}

.name{
font-size:17px;
font-weight:500;
}

/* CHAT */

.chat{
height:calc(100% - 75px);
padding:20px;
overflow-y:auto;
display:flex;
flex-direction:column;
scroll-behavior:smooth;
}

.message{
padding:14px 16px;
border-radius:18px;
margin-top:12px;
max-width:82%;
line-height:1.7;
font-size:14px;
color:white;
animation:fade 0.7s ease;
}

.received{
background:#202c33;
align-self:flex-start;
}

.sent{
background:#005c4b;
align-self:flex-end;
}

/* BOTON */

.nextBtn{
position:fixed;
bottom:35px;
right:30px;
width:65px;
height:65px;
border:none;
border-radius:50%;
background:#00a884;
color:white;
font-size:28px;
cursor:pointer;
box-shadow:0 0 25px rgba(0,0,0,0.5);
transition:0.3s;
z-index:10;
}

.nextBtn:hover{
transform:scale(1.08);
}

/* ANIMACIONES */

@keyframes fade{
from{
opacity:0;
transform:translateY(15px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>

<body>

<video id="video" autoplay muted loop playsinline>
<source src="video.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="phone">

<div class="notch"></div>

<div class="header">

<div class="avatar"></div>

<div class="name">
Paula ❤️
</div>

</div>

<div class="chat" id="chat">

<div class="message received">
Hola Paula ✨
</div>

</div>

</div>

<button class="nextBtn" onclick="nextMessage()">
➤
</button>

<script>

/* ACTIVAR SONIDO */

const video = document.getElementById('video');

document.body.addEventListener('click', () => {

video.muted = false;
video.play();

}, { once:true });

/* MENSAJES */

const mensajes = [

"Quería decirte algo... ❤️",

"No sabía muy bien cómo hacerlo.",

"Así que preferí crear este pequeño lugar para ti ✨",

"Porque hay personas que llegan normal...",

"y poco a poco terminan volviéndose especiales sin darse cuenta 🌙",

"Y honestamente...",

"creo que contigo me pasó eso ❤️",

"Me gusta hablar contigo.",

"Me gusta cuando apareces en mi pantalla ✨",

"Y también me gusta la tranquilidad que transmites.",

"No hice esto para presionarte.",

"Ni para pedirte respuestas.",

"Solo quería que supieras...",

"que alguien aquí te piensa bonito 🌹"

];

let index = 0;

function nextMessage(){

if(index < mensajes.length){

const chat = document.getElementById('chat');

const div = document.createElement('div');

div.classList.add('message');

if(index % 2 == 0){
div.classList.add('sent');
}else{
div.classList.add('received');
}

div.innerHTML = mensajes[index];

chat.appendChild(div);

chat.scrollTop = chat.scrollHeight;

index++;

}

}

</script>

</body>
</html>
