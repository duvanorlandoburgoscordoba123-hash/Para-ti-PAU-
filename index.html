<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Paula ❤️</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:black;overflow:hidden}

/* VIDEO */
video{position:fixed;width:100%;height:100%;object-fit:cover;filter:brightness(.28);z-index:-3;}
.overlay{position:fixed;width:100%;height:100%;background:rgba(0,0,0,.4);z-index:-2;}

/* INICIO */
.start{position:fixed;width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;background:black;color:white;z-index:100;cursor:pointer;text-align:center;}
.start h1{font-size:34px;margin-bottom:20px}
.start p{opacity:.7}

/* PHONE */
.phone{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:270px;height:540px;background:#111b21ee;border-radius:38px;overflow:hidden;box-shadow:0 0 40px rgba(0,0,0,.6);display:none;}
.header{height:70px;background:#202c33;display:flex;align-items:center;padding:18px;padding-top:28px;gap:10px;color:white;}
.avatar{width:40px;height:40px;border-radius:50%;background:url('image.png');background-size:cover;background-position:center;border:2px solid rgba(255,255,255,.2);}

.chat{height:calc(100% - 70px);padding:15px;overflow-y:auto;display:flex;flex-direction:column;}
.message{
padding:12px 14px;border-radius:16px;margin-top:10px;max-width:82%;
color:white;font-size:12px;letter-spacing:0;word-spacing:0;white-space:normal;
}
.received{background:#202c33;align-self:flex-start;}
.sent{background:#005c4b;align-self:flex-end;}
.time{font-size:9px;opacity:.6;margin-top:4px;text-align:right;}

.nextBtn{position:fixed;bottom:40px;right:40px;width:60px;height:60px;border:none;border-radius:50%;background:#00a884;color:white;font-size:24px;cursor:pointer;display:none;z-index:20;}

/* FINAL */
.final{position:fixed;width:100%;height:100%;background:black;display:flex;flex-direction:column;justify-content:center;align-items:center;opacity:0;transition:2s;pointer-events:none;z-index:50;text-align:center;}
.final.show{opacity:1;pointer-events:auto;}
.final img{width:260px;border-radius:25px;box-shadow:0 0 40px rgba(255,255,255,.2);margin-bottom:30px;}
.bigText{color:white;font-size:28px;max-width:500px;line-height:1.5;margin-bottom:30px;}

.btnLove{padding:14px 28px;margin:10px;border:none;border-radius:30px;font-size:18px;cursor:pointer;background:#ff4d6d;color:white;}
</style>
</head>

<body>

<video id="video" autoplay muted loop>
<source src="video.mp4" type="video/mp4">
</video>
<div class="overlay"></div>

<audio id="music" loop><source src="music.mp3"></audio>
<audio id="msgSound"><source src="msg.mp3"></audio>

<div class="start" onclick="startApp()">
<h1>Oye bonita ✨</h1>
<p>Toca la pantalla… prometo devolverte algo bonito ❤️</p>
</div>

<div class="phone" id="phone">
<div class="header"><div class="avatar"></div><div>Paula ❤️</div></div>
<div class="chat" id="chat"></div>
</div>

<button class="nextBtn" id="btn" onclick="nextMessage()">➜</button>

<div class="final" id="final">
<img src="image.png">
<div class="bigText" id="finalText"></div>
<button class="btnLove" onclick="poema1()">SI ❤️</button>
<button class="btnLove" onclick="poema2()">OBVIO SI 😏</button>
</div>

<script>
const mensajes=[
"Quería decirte algo... ❤️",
"No sabía muy bien cómo hacerlo.",
"Así que preferí crear este pequeño lugar para ti ✨",
"Porque hay personas que llegan normal...",
"y poco a poco se vuelven especiales 🌙",
"Y honestamente...",
"creo que contigo me pasó eso ❤️",
"Me gusta hablar contigo.",
"Me gusta cuando apareces en mi pantalla ✨",
"Y la tranquilidad que transmites.",
"Solo quería que supieras...",
"que alguien aquí te piensa bonito 🌹"
];

let index=0;
const msgSound=document.getElementById("msgSound");

function startApp(){
document.querySelector('.start').style.display='none';
phone.style.display='block';
btn.style.display='block';
video.muted=false;
music.play();
}

/* escritura perfecta */
function escribirMensaje(texto, elemento){
elemento.textContent="";
let i=0;
let intervalo=setInterval(()=>{
elemento.textContent += texto[i];
i++;
if(i>=texto.length) clearInterval(intervalo);
},30);
}

function nextMessage(){
if(index<mensajes.length){
let div=document.createElement('div');
div.classList.add('message');
index%2==0?div.classList.add('sent'):div.classList.add('received');
chat.appendChild(div);
msgSound.play();
escribirMensaje(mensajes[index],div);

let hora=new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
let t=document.createElement("div");
t.className="time";
t.innerHTML=hora;
div.appendChild(t);

chat.scrollTop=chat.scrollHeight;
index++;
}else{
btn.style.display='none';
final.classList.add('show');
setTimeout(()=>{
finalText.innerHTML="Desde que llegaste todo se siente más bonito ❤️<br><br>¿Te gustaría salir conmigo? 🌹";
},3000);
}
}

function poema1(){
finalText.innerHTML="No sé en qué momento pasó,<br>pero ahora sonrío cuando apareces.<br><br>No sé qué magia tienes,<br>pero haces que todo se sienta más bonito ✨";
}

function poema2(){
finalText.innerHTML="Si tuviera que elegir un lugar bonito,<br>no elegiría una ciudad ni un paisaje…<br><br>Elegiría cualquier lugar<br>donde estés tú ❤️";
}
</script>

</body>
</html>
