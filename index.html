<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hola ✨</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:black;
font-family:Arial,sans-serif;
}

video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

.overlay{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.35);
z-index:-1;
}

h1{
color:white;
font-size:60px;
letter-spacing:5px;
text-shadow:0 0 20px rgba(255,255,255,0.6);
animation:fade 2s ease;
}

.texto{
position:absolute;
bottom:60px;
color:white;
font-size:16px;
opacity:0.8;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>

<body>

<video id="video" autoplay muted loop playsinline>
<source src="video.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<h1>Hola ✨</h1>

<div class="texto">
Toca la pantalla ❤️
</div>

<script>

const video = document.getElementById('video');

document.body.addEventListener('click', () => {

video.muted = false;

video.play();

}, { once:true });

</script>

</body>
</html>
