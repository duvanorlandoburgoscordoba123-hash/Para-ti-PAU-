<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hola ✨</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:black;
font-family:Arial,sans-serif;
}

video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

.overlay{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.35);
z-index:-1;
}

h1{
color:white;
font-size:55px;
letter-spacing:4px;
text-shadow:0 0 20px rgba(255,255,255,0.6);
}

#playBtn{
position:absolute;
bottom:50px;
padding:15px 25px;
border:none;
border-radius:20px;
font-size:16px;
background:white;
color:black;
cursor:pointer;
}

</style>
</head>

<body>

<video id="bgVideo" muted loop playsinline>
<source src="video.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<h1>Hola ✨</h1>

<button id="playBtn">
🎵 Tocar
</button>

<script>

const btn = document.getElementById('playBtn');
const video = document.getElementById('bgVideo');

btn.addEventListener('click', async () => {

video.muted = false;

try{
await video.play();
btn.style.display = 'none';
}catch(e){
alert('Toca nuevamente para iniciar el video');
}

});

</script>

</body>
</html>

<div class="overlay"></div>

<h1>Hola ✨</h1>

<button id="musicaBtn" onclick="activarVideo()">
🎵 Tocar video
</button>

<script>

function activarVideo(){

const video = document.getElementById('videoFondo');

video.muted = false;

video.play();

document.getElementById('musicaBtn').style.display='none';

}

</script>

</body>
</html>
