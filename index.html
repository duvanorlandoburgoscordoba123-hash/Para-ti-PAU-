<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hola ✨</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:black;
font-family:Arial,sans-serif;
}

video{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
filter:brightness(0.45);
}

.overlay{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.35);
z-index:-1;
}

h1{
color:white;
font-size:55px;
letter-spacing:4px;
text-shadow:0 0 20px rgba(255,255,255,0.5);
animation:fade 2s ease;
}

#musicaBtn{
position:absolute;
bottom:40px;
padding:14px 22px;
border:none;
border-radius:20px;
background:white;
color:black;
font-size:16px;
cursor:pointer;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>

<body>

<video id="videoFondo" loop playsinline>
<source src="video.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<h1>Hola ✨</h1>

<button id="musicaBtn" onclick="activarVideo()">
🎵 Tocar video
</button>

<script>

function activarVideo(){

const video = document.getElementById('videoFondo');

video.muted = false;

video.play();

document.getElementById('musicaBtn').style.display='none';

}

</script>

</body>
</html>
