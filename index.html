<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mensajes Animados</title>

<style>
body{
    background:#0f172a;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial, Helvetica, sans-serif;
}

.chat{
    width:320px;
}

.bubble{
    background:#22c55e;
    color:white;
    padding:12px 16px;
    border-radius:18px;
    margin:10px 0;
    width:max-content;
    max-width:80%;
    opacity:0;
    transform:translateY(20px);
    animation:aparecer 0.6s forwards;
    
    /* 🔥 IMPORTANTE: evita separación de letras */
    letter-spacing: normal;
    word-spacing: normal;
    white-space: normal;
}

.bubble:nth-child(2){
    animation-delay:2s;
}

@keyframes aparecer{
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>
</head>

<body>

<div class="chat">
    <div class="bubble" id="msg1"></div>
    <div class="bubble" id="msg2"></div>
</div>

<script>
const texto1 = "Si, un poema lindo";
const texto2 = "Obvio, sí otro más lindo";

function escribirTexto(elemento, texto, velocidad){
    let i = 0;
    function escribir(){
        if(i < texto.length){
            elemento.innerHTML += texto.charAt(i);
            i++;
            setTimeout(escribir, velocidad);
        }
    }
    escribir();
}

// escribir mensajes con efecto typing
setTimeout(()=> escribirTexto(document.getElementById("msg1"), texto1, 40), 500);
setTimeout(()=> escribirTexto(document.getElementById("msg2"), texto2, 40), 2500);
</script>

</body>
</html>
