<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Paula ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0b141a;
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
}

video{
position:fixed;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
filter:brightness(0.3);
}

.overlay{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.45);
z-index:-1;
}

.chat{
width:100%;
max-width:420px;
height:100vh;
display:flex;
flex-direction:column;
padding:20px;
justify-content:flex-end;
}

.message{
background:#202c33;
color:white;
padding:16px;
border-radius:18px;
margin-top:12px;
line-height:1.8;
font-size:15px;
max-width:85%;
animation:fade 0.8s ease;
}

.sent{
background:#005c4b;
align-self:flex-end;
}

.nextBtn{
position:absolute;
bottom:35px;
right:25px;
width:60px;
height:60px;
border:none;
border-radius:50%;
background:#00a884;
color:white;
font-size:26px;
cursor:pointer;
box-shadow:0 0 20px rgba(0,0,0,0.4);
transition:0.3s;
}

.nextBtn:hover{
transform:scale(1.08);
}

@keyframes fade{
from{
opacity:0;
transform:translateY(15px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>

<body>

<video id="video" autoplay muted loop playsinline>
<source src="video.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="chat" id="chat">

<div class="message">
Hola Paula ✨
</div>

</div>

<button class="nextBtn" onclick="nextMessage()">
➜
</button>

<script>

const video = document.getElementById('video');

document.body.addEventListener('click', () => {

video.muted = false;
video.play();

}, { once:true });

const mensajes = [

"Quería decirte algo... ❤️",

"No sabía muy bien cómo hacerlo.",

"Así que preferí crear este pequeño lugar para ti ✨",

"Porque hay personas que llegan normal...",

"y poco a poco terminan volviéndose especiales sin darse cuenta 🌙",

"Y honestamente...",

"creo que contigo me pasó eso.",

"Me gusta hablar contigo.",

"Me gusta cuando apareces en mi pantalla ✨",

"Y también me gusta la tranquilidad que transmites ❤️",

"No hice esto para presionarte.",

"Ni para pedirte respuestas.",

"Solo quería que supieras...",

"que alguien aquí te piensa bonito 🌹"

];

let index = 0;

function nextMessage(){

if(index < mensajes.length){

const chat = document.getElementById('chat');

const div = document.createElement('div');

div.classList.add('message');

if(index % 2 == 0){
div.classList.add('sent');
}

div.innerHTML = mensajes[index];

chat.appendChild(div);

chat.scrollTop = chat.scrollHeight;

index++;

}

}

</script>

</body>
</html>
